kind = "web"
previewPath = "/"
title = "Cleantex Environmental Services"
version = "1.0.0"
id = "artifacts/cleantex-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19060

[services.development]
run = "pnpm --filter @workspace/cleantex-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cleantex-website", "run", "build" ]
publicDir = "artifacts/cleantex-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19060"
BASE_PATH = "/"
